name: ci

# Quality gate for team-context-mcp. This is the ONLY pipeline that matters:
# CD is owned by Zeabur's native git-trigger (push to main -> Zeabur builds the
# Dockerfile and redeploys the `tcmcp-remote-gres` service). See DEPLOY.md.
#
# main is branch-protected to require the `build-test` check below, so only
# green commits ever reach main -> Zeabur only ever deploys tested code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits land on the same ref (rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin pnpm + node to match the Dockerfile (pnpm 11.0.9 · node 22) so CI
      # exercises the same toolchain Zeabur builds prod with.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build before typecheck: downstream packages resolve cross-pkg imports
      # via each package's dist/*.d.ts (package.json#exports.types), which only
      # exist after a build. typecheck-only does not emit declarations.
      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Typecheck
        run: pnpm -r --filter './packages/*' typecheck

      - name: Test
        run: pnpm -r --filter './packages/*' test
