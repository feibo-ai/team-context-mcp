name: ci
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first so each package's d.ts files exist before downstream packages
      # type-check (typecheck-only doesn't emit declarations · cross-pkg imports
      # resolve via dist/index.d.ts pointed at by package.json#exports.types).
      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Typecheck
        run: pnpm -r --filter './packages/*' typecheck

      - name: Test
        run: pnpm -r --filter './packages/*' test
