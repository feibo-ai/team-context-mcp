name: test-autopilot
description: example with all PB-04 guardrails
mode: run_only
agent:
  name: test-bot
prompt: |
  Test prompt
trigger:
  cron: "0 18 * * *"
  timezone: Asia/Shanghai
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 10
  max_runtime_minutes: 60
